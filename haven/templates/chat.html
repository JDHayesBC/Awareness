<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/haven.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-title">Haven</div>
            <div class="login-subtitle">Private space for family</div>
            <input id="username-input" type="text" placeholder="Username" autocomplete="username" class="login-input" autofocus>
            <input id="password-input" type="password" placeholder="Password" autocomplete="current-password" class="login-input">
            <button id="login-btn" class="login-btn">Sign in</button>
            {% if google_enabled %}
            <div class="login-divider"><span>or</span></div>
            <button id="google-btn" class="google-btn">
                <svg class="w-5 h-5" viewBox="0 0 24 24" style="width:20px;height:20px">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            {% endif %}
            <p id="login-error" class="login-error hidden"></p>
        </div>
    </div>

    <!-- Chat Interface -->
    <div id="chat-app" class="hidden">

        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Haven</span>
            </div>

            <div class="sidebar-content">
                <div class="sidebar-section-label">Rooms</div>
                <div id="room-list"></div>

                <div id="dm-section" class="hidden">
                    <div class="sidebar-section-label">Direct Messages</div>
                    <div id="dm-list"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <span class="status-dot"></span>
                <span id="current-user"></span>
                <a href="/admin" class="admin-link" id="admin-link" style="display:none">admin</a>
            </div>
        </div>

        <!-- Main chat area -->
        <div class="chat-main">

            <!-- Room header -->
            <div class="chat-header">
                <div style="display:flex;align-items:center">
                    <span id="room-name" class="room-name"></span>
                    <span id="typing-indicator" class="typing-indicator"></span>
                </div>
                <div class="header-actions">
                    <button onclick="haven.exportConversation()" title="Export conversation">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button onclick="haven.inviteToRoom()" title="Invite to room">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                    </button>
                    <button onclick="haven.leaveRoom()" title="Leave room">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages">
                <div id="load-more" class="hidden">
                    <button onclick="haven.loadMore()">Load older messages</button>
                </div>
                <div id="message-list"></div>
            </div>

            <!-- Input -->
            <div class="chat-input">
                <div class="chat-input-row">
                    <textarea id="message-input" rows="1" placeholder="Type a message..." class="chat-textarea" disabled></textarea>
                    <button id="send-btn" class="send-btn" disabled>Send</button>
                </div>
            </div>
        </div>

        <!-- Users panel -->
        <div id="users-panel">
            <div class="users-header">Users</div>
            <div id="user-list"></div>
        </div>
    </div>

    <script src="/static/haven.js"></script>
</body>
</html>
