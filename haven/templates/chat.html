<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/haven.css">
</head>
<body class="h-full bg-gray-900 text-gray-100">

    <!-- Login Screen -->
    <div id="login-screen" class="flex items-center justify-center h-full">
        <div class="bg-gray-800 rounded-lg p-8 max-w-sm w-full mx-4 border border-gray-700">
            <h1 class="text-2xl font-bold mb-2 text-center">Haven</h1>
            <p class="text-gray-400 text-sm text-center mb-6">Private space for family</p>
            <input
                id="username-input"
                type="text"
                placeholder="Username"
                autocomplete="username"
                class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-gray-100 placeholder-gray-500 mb-3"
                autofocus
            >
            <input
                id="password-input"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-gray-100 placeholder-gray-500 mb-4"
            >
            <button
                id="login-btn"
                class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors disabled:opacity-50"
            >
                Sign in
            </button>
            {% if google_enabled %}
            <div class="flex items-center gap-3 my-4">
                <div class="flex-1 h-px bg-gray-600"></div>
                <span class="text-gray-500 text-sm">or</span>
                <div class="flex-1 h-px bg-gray-600"></div>
            </div>
            <button
                id="google-btn"
                class="w-full py-2 bg-white hover:bg-gray-100 text-gray-900 rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
            >
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            {% endif %}
            <p id="login-error" class="text-red-400 text-sm mt-3 text-center hidden"></p>
        </div>
    </div>

    <!-- Chat Interface (hidden until login) -->
    <div id="chat-app" class="hidden h-full flex">

        <!-- Sidebar -->
        <div id="sidebar" class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col flex-shrink-0">

            <!-- Server header -->
            <div class="px-4 py-3 border-b border-gray-700">
                <h2 class="font-bold text-lg">Haven</h2>
            </div>

            <!-- Rooms -->
            <div class="flex-1 overflow-y-auto px-2 py-2">
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mb-1">Rooms</div>
                <div id="room-list"></div>

                <div id="dm-section" class="mt-4 hidden">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mb-1">Direct Messages</div>
                    <div id="dm-list"></div>
                </div>
            </div>

            <!-- User info -->
            <div class="px-3 py-2 border-t border-gray-700 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></div>
                <span id="current-user" class="text-sm truncate"></span>
            </div>
        </div>

        <!-- Main chat area -->
        <div class="flex-1 flex flex-col min-w-0">

            <!-- Room header -->
            <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between flex-shrink-0">
                <div>
                    <span id="room-name" class="font-bold"></span>
                    <span id="typing-indicator" class="text-sm text-gray-500 ml-2 hidden"></span>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        id="export-btn"
                        onclick="haven.exportConversation()"
                        title="Export conversation"
                        class="p-1.5 text-gray-400 hover:text-gray-200 rounded transition-colors"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button
                        id="invite-btn"
                        onclick="haven.inviteToRoom()"
                        title="Invite to room"
                        class="p-1.5 text-gray-400 hover:text-gray-200 rounded transition-colors"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                    </button>
                    <button
                        id="leave-btn"
                        onclick="haven.leaveRoom()"
                        title="Leave room"
                        class="p-1.5 text-gray-400 hover:text-red-400 rounded transition-colors"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages" class="flex-1 overflow-y-auto px-4 py-2 flex flex-col">
                <div id="load-more" class="text-center py-2 hidden">
                    <button class="text-sm text-gray-500 hover:text-gray-300" onclick="haven.loadMore()">Load older messages</button>
                </div>
                <div id="message-list"></div>
            </div>

            <!-- Input -->
            <div class="px-4 py-3 border-t border-gray-700 flex-shrink-0">
                <div class="flex gap-2">
                    <textarea
                        id="message-input"
                        rows="1"
                        placeholder="Type a message..."
                        class="flex-1 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 text-gray-100 placeholder-gray-500 resize-none overflow-y-hidden"
                        disabled
                    ></textarea>
                    <button
                        id="send-btn"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors disabled:opacity-50"
                        disabled
                    >
                        Send
                    </button>
                </div>
            </div>
        </div>

        <!-- Users panel -->
        <div id="users-panel" class="w-48 bg-gray-800 border-l border-gray-700 flex-shrink-0 hidden lg:flex flex-col">
            <div class="px-4 py-3 border-b border-gray-700">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Users</span>
            </div>
            <div id="user-list" class="flex-1 overflow-y-auto px-2 py-2"></div>
        </div>
    </div>

    <script src="/static/haven.js"></script>
</body>
</html>
